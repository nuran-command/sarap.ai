version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sarap_db
    restart: always
    environment:
      POSTGRES_USER: sarap_user
      POSTGRES_PASSWORD: sarap_secure_password_2026
      POSTGRES_DB: sarap_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sarap_user -d sarap_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: sarap_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sarap.ai
      PGADMIN_DEFAULT_PASSWORD: admin_secure_password_2026
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
